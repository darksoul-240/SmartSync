<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <header>
        <h1>SmartSync</h1>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="devices.html">Devices</a></li>
                <li><a href="security.html">Security</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="home-grid">
        <section class="widget full-width">
            <h2>Devices</h2>
            <div class="device-list">
                <div class="device" data-device="camera">
                    <div>
                        <span>Security Camera</span>
                        <span class="status active" data-status>Active</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-on">Turn On</button>
                        <button class="btn-off">Turn Off</button>
                    </div>
                </div>
                <div class="device" data-device="lock">
                    <div>
                        <span>Smart Lock</span>
                        <span class="status active" data-status>Locked</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-lock">Lock</button>
                        <button class="btn-unlock">Unlock</button>
                    </div>
                </div>
                <div class="device" data-device="thermostat">
                    <div>
                        <span>Thermostat</span>
                        <span class="status active" data-status>21°C</span>
                    </div>
                    <div class="device-controls">
                        <input type="number" value="21" class="temp-input">
                        <button class="btn-set-temp">Set</button>
                    </div>
                </div>
                 <div class="device" data-device="light">
                    <div>
                        <span>Smart Light</span>
                        <span class="status inactive" data-status>Off</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-light-on">Turn On</button>
                        <button class="btn-light-off">Turn Off</button>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="widget full-width">
            <h2>Alerts</h2>
            <div class="alert">
                <p><strong>[DOOR UNLOCKED]</strong> Front door was unlocked at 10:32 AM.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SmartSync. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

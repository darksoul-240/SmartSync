<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices - SmartSync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <header>
        <h1>SmartSync</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="devices.html" class="active">Devices</a></li>
                <li><a href="security.html">Security</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Device Management</h2>
        <table>
            <thead>
                <tr>
                    <th>Device Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr data-device="camera">
                    <td>Security Camera</td>
                    <td data-status>Active</td>
                    <td>
                        <button class="btn-on">Turn On</button>
                        <button class="btn-off">Turn Off</button>
                    </td>
                </tr>
                <tr data-device="lock">
                    <td>Smart Lock</td>
                    <td data-status>Locked</td>
                    <td>
                        <button class="btn-lock">Lock</button>
                        <button class="btn-unlock">Unlock</button>
                    </td>
                </tr>
                <tr data-device="thermostat">
                    <td>Thermostat</td>
                    <td data-status>21°C</td>
                    <td>
                        <input type="number" value="21" class="temp-input">
                        <button class="btn-set-temp">Set</button>
                    </td>
                </tr>
                <tr data-device="light">
                    <td>Smart Light</td>
                    <td data-status>Off</td>
                    <td>
                        <button class="btn-light-on">Turn On</button>
                        <button class="btn-light-off">Turn Off</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer>
        <p>&copy; 2026 SmartSync. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security - SmartSync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <header>
        <h1>SmartSync</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="devices.html">Devices</a></li>
                <li><a href="security.html" class="active">Security</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="widget full-width">
            <h2>Live Controls</h2>
            <div class="device-list">
                <div class="device" data-device="camera">
                    <div>
                        <span>Security Camera</span>
                        <span class="status active" data-status>Active</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-on">Turn On</button>
                        <button class="btn-off">Turn Off</button>
                    </div>
                </div>
                <div class="device" data-device="lock">
                    <div>
                        <span>Smart Lock</span>
                        <span class="status active" data-status>Locked</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-lock">Lock</button>
                        <button class="btn-unlock">Unlock</button>
                    </div>
                </div>
                 <div class="device" data-device="light">
                    <div>
                        <span>Smart Light</span>
                        <span class="status inactive" data-status>Off</span>
                    </div>
                    <div class="device-controls">
                        <button class="btn-light-on">Turn On</button>
                        <button class="btn-light-off">Turn Off</button>
                    </div>
                </div>
            </div>
        </section>

        <h2>Security Logs</h2>
        <table id="log-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Event</th>
                    <th>Source</th>
                </tr>
            </thead>
            <tbody>
                <!-- Logs will be dynamically inserted here -->
            </tbody>
        </table>
    </main>

    <footer>
        <p>&copy; 2026 SmartSync. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
